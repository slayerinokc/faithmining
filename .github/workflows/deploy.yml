name: Deploy to Cloudflare Workers

on:
  push:
    branches: [main]

jobs:
  deploy-tools:
    name: Deploy tools.faithmining.net
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Deploy faithmining-tools
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: faithmining-tools

  deploy-main:
    name: Deploy faithmining.net
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Deploy faithmining-main
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: faithmining-main

  deploy-solo:
    name: Deploy solo.faithmining.net
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Deploy faithmining-solo
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: faithmining-solo
